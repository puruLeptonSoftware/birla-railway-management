<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  width="24"
  height="24"
>
  <!-- Body of the coach: ST status frame color #a4133c -->
  <rect x="1" y="6" width="22" height="10" fill="#a4133c" />

  <!-- Windows (three white strips) -->
  <rect x="5" y="8" width="3" height="6" fill="#ffffff" />
  <rect x="10.5" y="8" width="3" height="6" fill="#ffffff" />
  <rect x="16" y="8" width="3" height="6" fill="#ffffff" />

  <!-- Wheels: same ST frame color -->
  <circle cx="6" cy="16" r="2" fill="#a4133c" />
  <circle cx="18" cy="16" r="2" fill="#a4133c" />
</svg>

